<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="card-body">
      <img
        src="./assets/images/illustration-article.svg"
        alt="illustration image"
        class="img-card"
      />
      <h1 class="h1-card">Learning</h1>
      <p class="p1-card">Published 21 Dec 2023</p>
      <h2 class="h2-card">HTML & CSS foundations</h2>
      <p class="p2-card">
        These langueges are the backbone of every website, the defining
        structure, content , and presentation
      </p>
      <div class="card-avatar">
        <img
          class="img2-card"
          src="./assets/images/image-avatar.webp"
          alt="avatar"
        />
        <p class="p3-card">Greg Hooper</p>
      </div>
    </div>
  </body>
</html>
